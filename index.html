<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>亲吻实验室 - 15秒挑战版</title>
    <style>
        :root {
            --boy-color: #4facfe;
            --girl-color: #ff758c;
            --main-red: #ff4d6d;
            --gold: #ffd700;
        }

        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #fff5f7;
            transition: background-color 0.8s ease;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden;
            touch-action: manipulation;
        }

        .header-info {
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 20px 20px 0;
            box-sizing: border-box;
            z-index: 20;
        }

        .score-board {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: rgba(255,255,255,0.9);
            padding: 10px 15px;
            border-radius: 15px;
            min-width: 90px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        .stat-val { font-size: 28px; font-weight: bold; }
        .stat-label { font-size: 12px; color: #888; }

        .turn-indicator {
            margin-top: 20px;
            padding: 12px 40px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 18px;
            color: white;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: all 0.5s;
            z-index: 30;
        }

        .boy-turn { background: var(--boy-color); }
        .girl-turn { background: var(--girl-color); }

        .timer-container {
            margin-top: 20px;
            width: 80%;
            height: 12px;
            background: #eee;
            border-radius: 6px;
            overflow: hidden;
            opacity: 0;
            transition: opacity 0.3s;
            border: 2px solid white;
        }

        #timer-bar {
            width: 100%;
            height: 100%;
            background: linear-gradient(to right, #ff4d6d, #ff8fa3);
            transition: width 0.1s linear;
        }

        .main-stage {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 100%;
            position: relative;
        }

        .box-container {
            width: 160px;
            height: 160px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            z-index: 5;
        }

        #blind-box {
            font-size: 100px;
            user-select: none;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .shake { animation: shake 0.5s infinite; }
        @keyframes shake {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(8deg); }
            75% { transform: rotate(-8deg); }
        }

        .result-card {
            margin-top: 10px;
            text-align: center;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.5s;
        }

        .result-card.show { opacity: 1; transform: translateY(0); }
        .kiss-title { font-size: 28px; font-weight: bold; color: var(--main-red); margin-bottom: 8px; }
        .kiss-desc { font-size: 18px; color: #444; max-width: 280px; line-height: 1.4; padding: 0 10px; }

        /* 侧边按钮：悬浮在屏幕右侧中央 */
        .btn-done {
            position: fixed;
            right: 15px;
            top: 50%;
            transform: translateY(-50%) translateX(150%);
            width: 90px;
            height: 90px;
            background: var(--main-red);
            color: white;
            border: 4px solid white;
            border-radius: 50%;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 8px 25px rgba(255, 77, 109, 0.4);
            z-index: 500;
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            line-height: 1.2;
        }

        .btn-done.active {
            transform: translateY(-50%) translateX(0);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(255, 77, 109, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(255, 77, 109, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 77, 109, 0); }
        }

        .history-bar {
            width: 100%;
            padding: 15px;
            text-align: center;
            background: white;
            border-top: 1px solid #eee;
            font-size: 14px;
            color: #999;
        }

        #winner-modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, #ff4d6d, #ff8fa3);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            color: white;
            text-align: center;
        }

        .reward-box {
            background: white;
            color: var(--main-red);
            padding: 30px;
            border-radius: 30px;
            margin: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .heart-particle {
            position: absolute;
            pointer-events: none;
            animation: flyUp 1.2s ease-out forwards;
            z-index: 600;
        }

        @keyframes flyUp {
            0% { transform: translate(-50%, -50%) scale(0.5); opacity: 1; }
            100% { transform: translate(-50%, -300px) rotate(45deg) scale(2); opacity: 0; }
        }
    </style>
</head>
<body>

<div class="header-info">
    <div class="score-board" style="border-bottom: 4px solid var(--boy-color)">
        <span class="stat-label">男生得分</span>
        <span id="boy-score" class="stat-val" style="color: var(--boy-color)">0</span>
    </div>
    <div class="score-board" style="border-bottom: 4px solid var(--girl-color)">
        <span class="stat-label">女生得分</span>
        <span id="girl-score" class="stat-val" style="color: var(--girl-color)">0</span>
    </div>
</div>

<div id="turn-display" class="turn-indicator boy-turn">男生准备抽盒</div>

<div class="timer-container" id="timer-ui">
    <div id="timer-bar"></div>
</div>

<div class="main-stage">
    <div class="box-container" onclick="openBox()">
        <div id="blind-box" class="shake">🎁</div>
    </div>
    
    <div id="result" class="result-card">
        <div id="res-name" class="kiss-title">心跳契约</div>
        <div id="res-desc" class="kiss-desc">点击礼盒开启 15 秒限时挑战</div>
    </div>
</div>

<!-- 侧边确认按钮 -->
<button id="done-btn" class="btn-done" onclick="finishTask()">我<br>亲完了</button>

<div class="history-bar">
    ⏱️ 警告：超过 15 秒未点击按钮将判定为失败
</div>

<div id="winner-modal">
    <div style="font-size: 60px;">👑</div>
    <h1 id="winner-role" style="font-size: 36px; margin: 10px 0;">获胜者</h1>
    <div class="reward-box">
        <div style="font-size: 20px; font-weight: bold; margin-bottom: 10px;">🎁 终极奖赏：</div>
        <div style="font-size: 28px; font-weight: 900; line-height: 1.2; text-decoration: underline;">亲吻你最喜欢<br>对方的部位</div>
    </div>
    <button style="padding: 12px 40px; border-radius: 50px; border:none; font-weight:bold; color:var(--main-red); cursor:pointer;" onclick="location.reload()">重新开始</button>
</div>

<script>
    // 统一设置所有任务时间为 15 秒
    const CHALLENGE_TIME = 15;

    const kisses = [
        { name: "额头亲亲", emoji: "✨", desc: "亲吻对方额头" },
        { name: "蝴蝶之吻", emoji: "🧚", desc: "用睫毛轻扫对方脸颊" },
        { name: "脸颊啵啵", emoji: "💕", desc: "在 TA 的双颊各留一个响吻" },
        { name: "鼻尖轻碰", emoji: "🐰", desc: "鼻尖蹭鼻尖三下" },
        { name: "耳垂私语", emoji: "👂", desc: "亲吻耳垂并耳语一句悄悄话" },
        { name: "颈间深嗅", emoji: "🩸", desc: "深嗅对方颈部并亲吻锁骨" },
        { name: "法式深吻", emoji: "👅", desc: "完成一个缠绵热吻" },
        { name: "咬唇轻吻", emoji: "⚡", desc: "轻轻咬一下对方的下唇" },
        { name: "背后拥吻", emoji: "🫂", desc: "从后面抱住并亲吻后颈" },
        { name: "心跳之吻", emoji: "💓", desc: "亲吻对方左胸口位置" }
    ];

    let game = {
        turn: 'boy',
        busy: false,
        scores: { boy: 0, girl: 0 },
        timer: null,
        target: 6
    };

    const box = document.getElementById('blind-box');
    const resultCard = document.getElementById('result');
    const doneBtn = document.getElementById('done-btn');
    const timerUI = document.getElementById('timer-ui');
    const timerBar = document.getElementById('timer-bar');

    function openBox() {
        if (game.busy) return;
        game.busy = true;

        box.classList.remove('shake');
        box.style.transform = "scale(0.5) rotate(720deg)";
        box.style.opacity = "0";
        resultCard.classList.remove('show');
        doneBtn.classList.remove('active');

        setTimeout(() => {
            const rand = kisses[Math.floor(Math.random() * kisses.length)];
            box.innerText = rand.emoji;
            box.style.transform = "scale(1.2) rotate(0deg)";
            box.style.opacity = "1";
            
            document.getElementById('res-name').innerText = rand.name;
            document.getElementById('res-desc').innerText = rand.desc;
            resultCard.classList.add('show');
            
            startCountdown(CHALLENGE_TIME);
        }, 600);
    }

    function startCountdown(sec) {
        let current = sec;
        timerUI.style.opacity = "1";
        doneBtn.classList.add('active'); // 侧边滑入
        
        // 确保进度条初始是满的
        timerBar.style.width = "100%";

        game.timer = setInterval(() => {
            current -= 0.1;
            const p = (current / sec) * 100;
            timerBar.style.width = p + "%";

            if (current <= 0) {
                failChallenge();
            }
        }, 100);
    }

    function finishTask() {
        if (!game.timer) return; // 防止重复点击或非法点击

        clearInterval(game.timer);
        game.timer = null;
        timerUI.style.opacity = "0";
        doneBtn.classList.remove('active'); // 侧边滑回
        
        // 成功得分
        game.scores[game.turn]++;
        document.getElementById(game.turn + '-score').innerText = game.scores[game.turn];
        
        celebrate(true);
        
        if (game.scores[game.turn] >= game.target) {
            setTimeout(showWin, 500);
        } else {
            setTimeout(nextTurn, 1500);
        }
    }

    function failChallenge() {
        clearInterval(game.timer);
        game.timer = null;
        timerUI.style.opacity = "0";
        doneBtn.classList.remove('active');
        
        celebrate(false);
        document.getElementById('res-name').innerText = "时间到！";
        document.getElementById('res-desc').innerText = "超过 15 秒未确认，挑战失败 💔";
        
        setTimeout(nextTurn, 2500);
    }

    function nextTurn() {
        game.turn = (game.turn === 'boy') ? 'girl' : 'boy';
        game.busy = false;
        
        const turnEl = document.getElementById('turn-display');
        turnEl.innerText = (game.turn === 'boy' ? "男生" : "女生") + "准备抽盒";
        turnEl.className = "turn-indicator " + (game.turn === 'boy' ? "boy-turn" : "girl-turn");
        
        box.innerText = "🎁";
        box.classList.add('shake');
        resultCard.classList.remove('show');
    }

    function celebrate(ok) {
        for(let i=0; i<15; i++) {
            const p = document.createElement('div');
            p.className = 'heart-particle';
            p.innerText = ok ? ['❤️','💖','✨','💋'][Math.floor(Math.random()*4)] : '💔';
            p.style.left = '50%';
            p.style.top = '50%';
            p.style.fontSize = (Math.random()*20+20)+'px';
            p.style.marginLeft = (Math.random()-0.5)*300 + 'px';
            p.style.marginTop = (Math.random()-0.5)*200 + 'px';
            document.body.appendChild(p);
            setTimeout(() => p.remove(), 1200);
        }
    }

    function showWin() {
        const modal = document.getElementById('winner-modal');
        document.getElementById('winner-role').innerText = (game.turn === 'boy' ? "男生" : "女生") + " 获胜！";
        modal.style.display = 'flex';
    }
</script>
</body>
</html>
